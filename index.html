<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/style.css">
    <title>Apprendre ses DL en 0</title>
</head>
<body>
    <div id="content">
        <div id="main">
            <h1>DL<sub>n</sub>(0) de exp(x)</h1>
            <p>Compléter le développement limité à l'ordre n de exp(x) en 0</p>
            <div id="dl">
                <span>exp(x)</span>
                <span class="equals">
                    <span> = </span>
                    <span class="varlim">x → 0</span>
                </span>
                <span>
                    <input
                        type="text"
                        placeholder="1"
                    />
                </span>

                <span> + </span>
                <span>
                    <input
                        type="text"
                        placeholder="1"
                    />
                </span>
                <span>x</span>

                <span> + </span>
                <span>
                    <input
                        type="text"
                        placeholder="1"
                    />
                </span>
                <span>x<sup>2</sup></span>

                <span> + … + </span>

                <span>
                    <input
                        type="text"
                        placeholder="1"
                    />
                </span>
                <span>x<sup>n</sup></span>

                <span> + </span>
                <span>o(x<sup>
                    <input
                        class="exp"
                        type="text"
                        placeholder="1"
                    /></sup>)
                </span>
            </div>
        </div>
    </div>
    <footer>
        <p>Développé avec ❤️ par Milan</p>
    </footer>
</body>
</html>
